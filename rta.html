<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rta | Minimalist AI Code Editor</title>
  <meta name="description"
    content="Rta is a high-performance, minimalist AI-assisted code editor with a small memory footprint, integrated Git support, and AI capabilities.">
  <meta name="keywords"
    content="Rta, AI code editor, minimalist editor, lightweight IDE, systems programming, schallten">
  <meta name="author" content="schallten">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://schallten.github.io/rta.html">
  <meta property="og:title" content="Rta | Minimalist AI Code Editor">
  <meta property="og:description" content="Small footprint, massive intelligence. The AI code editor for developers who value performance and simplicity.">
  <meta property="og:image" content="assets/img/icon.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://schallten.github.io/rta.html">
  <meta property="twitter:title" content="Rta | Minimalist AI Code Editor">
  <meta property="twitter:description" content="Small footprint, massive intelligence. The AI code editor for developers who value performance and simplicity.">
  <meta property="twitter:image" content="assets/img/icon.png">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: url('assets/img/bg.png')center/cover no-repeat, #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background-position 0.1s;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 30px 20px;
      max-width: 400px;
      transition: 0.3s;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    p {
      font-size: 16px;
      margin-bottom: 30px;
      line-height: 1.4;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.2), rgba(0, 0, 0, 0.8));
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
    }

    button:hover {
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
      transform: scale(1.05);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 20px;
    }

    .modal-content {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      padding: 25px;
      position: relative;
      animation: fadeIn 0.3s;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
    }

    .modal iframe {
      width: 100%;
      height: 450px;
      border: none;
      border-radius: 12px;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #fff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width:480px) {
      h1 {
        font-size: 24px;
      }

      p {
        font-size: 14px;
      }

      .modal iframe {
        height: 350px;
      }
    }

    @media(min-width:1024px) {
      .container {
        max-width: 500px;
        padding: 40px;
      }

      .h1 {
        font-size: 36px;
      }

      .p {
        font-size: 18px;
      }
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .stars span {
      position: absolute;
      top: -10%;
      width: 2px;
      height: 2px;
      background: white;
      opacity: 0;
      box-shadow: 0 0 6px white;
      animation: shoot 6s linear infinite;
    }

    /* random positions */
    .stars span:nth-child(1) {
      left: 20%;
      animation-delay: 0s;
    }

    .stars span:nth-child(2) {
      left: 60%;
      animation-delay: 2s;
    }

    .stars span:nth-child(3) {
      left: 80%;
      animation-delay: 4s;
    }

    .stars span:nth-child(4) {
      left: 80%;
      animation-delay: 6s;
    }

    @keyframes shoot {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translateY(120vh) translateX(-40vw) scale(0.8);
        opacity: 0;
      }
    }
  </style>
</head>
<div class="stars">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<body>
  <div class="container">
    <img src="assets/img/icon.png" alt="Rta" class="icon">
    <h1>Rta</h1>
    <p>AI-assisted code editor with small memory footprint - quick edits, Git & AI support anywhere.</p>
    <button id="waitlistBtn">Join Waitlist</button>
  </div>

  <div class="modal" id="waitlistModal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSfnm1xCMBLUks3NIFWDfcyjvc6zIzC5gkQkevuXnTSGUnPQOQ/viewform?embedded=true">Loading…</iframe>
    </div>
  </div>

  <script>
    // Waitlist modal
    const btn = document.getElementById('waitlistBtn');
    const modal = document.getElementById('waitlistModal');
    const close = document.getElementById('closeModal');
    btn.onclick = () => modal.style.display = 'flex';
    close.onclick = () => modal.style.display = 'none';
    window.onclick = e => { if (e.target === modal) modal.style.display = 'none'; }

    // Subtle background parallax on mouse
    document.addEventListener('mousemove', e => {
      const x = (e.clientX / window.innerWidth - 0.5) * 10; // max 5% shift
      const y = (e.clientY / window.innerHeight - 0.5) * 10;
      document.body.style.backgroundPosition = `${50 + x}% ${50 + y}%`;
    });
  </script>
</body>

</html>
